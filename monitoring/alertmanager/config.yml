# Alertmanager Configuration

global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@monitoring.com'
  smtp_auth_username: 'your-email@gmail.com'
  smtp_auth_password: 'your-app-password'
  smtp_require_tls: true

# Templates for notifications
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Route tree for alerts
route:
  group_by: ['alertname', 'instance', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'
  
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 5s
      repeat_interval: 30m
    
    # Warning alerts - grouped notifications
    - match:
        severity: warning
      receiver: 'warning-alerts'
      group_wait: 30s
      repeat_interval: 4h
    
    # CPU alerts
    - match:
        category: cpu
      receiver: 'cpu-alerts'
    
    # Memory alerts
    - match:
        category: memory
      receiver: 'memory-alerts'
    
    # Disk alerts
    - match:
        category: disk
      receiver: 'disk-alerts'

# Inhibition rules
inhibit_rules:
  # Inhibit warning if critical is firing
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'instance']

# Receivers
receivers:
  - name: 'default-receiver'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        headers:
          Subject: '{{ .GroupLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        html: |
          <h2>Alert: {{ .GroupLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Instance:</strong> {{ .GroupLabels.instance }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Time:</strong> {{ .StartsAt }}</p>

  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@example.com,oncall@example.com'
        send_resolved: true
        headers:
          Subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        html: |
          <h2 style="color: red;">CRITICAL ALERT</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Instance:</strong> {{ .GroupLabels.instance }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong> {{ .CommonAnnotations.description }}</p>
          <p><strong>Time:</strong> {{ .StartsAt }}</p>
          <p style="color: red;">IMMEDIATE ACTION REQUIRED</p>

  - name: 'warning-alerts'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        headers:
          Subject: '⚠️  WARNING: {{ .GroupLabels.alertname }}'

  - name: 'cpu-alerts'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        headers:
          Subject: 'CPU Alert: {{ .GroupLabels.instance }}'

  - name: 'memory-alerts'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        headers:
          Subject: 'Memory Alert: {{ .GroupLabels.instance }}'

  - name: 'disk-alerts'
    email_configs:
      - to: 'admin@example.com'
        send_resolved: true
        headers:
          Subject: 'Disk Alert: {{ .GroupLabels.instance }}'
