global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:

  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  # EC2 Node Exporter (FIXED)
  - job_name: "node-exporter"
    static_configs:
